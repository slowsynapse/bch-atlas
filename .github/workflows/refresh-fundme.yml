name: Refresh FundMe Data

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch: # Manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch fresh FundMe data
        run: npx tsx scripts/fetch-fundme.ts | tee /tmp/fetch-fundme.log

      - name: Surface summary to job page
        run: |
          echo "## FundMe refresh summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 40 /tmp/fetch-fundme.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/fundme.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "BCH Atlas Bot"
          git config user.email "bot@bch-atlas.org"
          git add data/fundme.json

          # Build a commit message that surfaces lifecycle changes + any
          # rejected suspicious transitions so the git log itself tells
          # the story without anyone needing to open the workflow run.
          NEW=$(grep -c "^  + id=" /tmp/fetch-fundme.log || true)
          CHANGED=$(grep -c "^  status:" /tmp/fetch-fundme.log || true)
          REJECTED=$(grep -c "^  ⚠ rejected transition:" /tmp/fetch-fundme.log || true)

          {
            echo "chore: refresh FundMe campaign data"
            echo
            echo "$NEW new, $CHANGED status changes, $REJECTED rejected transitions"
            if [ "$REJECTED" -gt 0 ]; then
              echo
              echo "Rejected (need human review):"
              grep "^  ⚠ rejected transition:" /tmp/fetch-fundme.log | sed 's/^  ⚠ /- /'
            fi
          } > /tmp/commit-msg.txt

          git commit -F /tmp/commit-msg.txt
          git push
