<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Broken/derelict station -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#5A6A6A" stroke-width="0.6" opacity="0.3" stroke-dasharray="3 3"/>
  <!-- Broken solar panels (one missing) -->
  <rect x="2" y="30" width="14" height="4" fill="#0a0e0e" stroke="#5A6A6A" stroke-width="0.6"/>
  <rect x="48" y="30" width="9" height="4" fill="#0a0e0e" stroke="#5A6A6A" stroke-width="0.6"/>
  <rect x="30" y="2" width="4" height="9" fill="#0a0e0e" stroke="#5A6A6A" stroke-width="0.6"/>
  <!-- Bottom panel completely missing (debris) -->
  <line x1="30" y1="48" x2="34" y2="58" stroke="#5A6A6A" stroke-width="0.5" opacity="0.4"/>
  <line x1="34" y1="48" x2="32" y2="60" stroke="#5A6A6A" stroke-width="0.5" opacity="0.4"/>
  <!-- Inner ring (cracked) -->
  <path d="M 21 32 A 11 11 0 0 1 32 21" fill="none" stroke="#5A6A6A" stroke-width="0.7"/>
  <path d="M 32 43 A 11 11 0 0 1 21 32" fill="none" stroke="#5A6A6A" stroke-width="0.7"/>
  <!-- Dim hub -->
  <circle cx="32" cy="32" r="6" fill="#0a0e0e" stroke="#5A6A6A" stroke-width="1"/>
  <line x1="28" y1="28" x2="36" y2="36" stroke="#5A6A6A" stroke-width="0.8"/>
  <line x1="36" y1="28" x2="28" y2="36" stroke="#5A6A6A" stroke-width="0.8"/>
</svg>
