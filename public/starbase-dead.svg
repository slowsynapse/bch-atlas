<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="120" height="80">
  <!-- Destroyed O'Neill cylinder — fractured hull, broken end caps, debris -->
  <!-- Faint axis -->
  <line x1="10" y1="40" x2="110" y2="40" stroke="#FF4455" stroke-width="0.3" opacity="0.2" stroke-dasharray="1 3"/>
  <!-- Cylinder torn in two: left fragment -->
  <path d="M 20 28 L 48 28 L 50 33 L 46 40 L 50 47 L 48 52 L 20 52 Z" fill="#1a0000" stroke="#FF4455" stroke-width="0.9"/>
  <ellipse cx="20" cy="40" rx="5" ry="12" fill="#1a0000" stroke="#FF4455" stroke-width="0.9"/>
  <!-- Cracks on left fragment -->
  <line x1="32" y1="28" x2="36" y2="40" stroke="#FF4455" stroke-width="0.5"/>
  <line x1="36" y1="40" x2="32" y2="52" stroke="#FF4455" stroke-width="0.5"/>
  <!-- Cylinder right fragment (slightly offset) -->
  <path d="M 76 30 L 100 30 L 100 50 L 76 50 L 72 47 L 76 40 L 72 33 Z" fill="#1a0000" stroke="#FF4455" stroke-width="0.9"/>
  <ellipse cx="100" cy="40" rx="5" ry="12" fill="#1a0000" stroke="#FF4455" stroke-width="0.9"/>
  <line x1="86" y1="30" x2="84" y2="40" stroke="#FF4455" stroke-width="0.5"/>
  <line x1="84" y1="40" x2="86" y2="50" stroke="#FF4455" stroke-width="0.5"/>
  <!-- Explosion in the gap -->
  <g transform="translate(60 40)">
    <polygon points="0,-14 4,-4 14,0 4,4 0,14 -4,4 -14,0 -4,-4" fill="#FF4455" opacity="0.9"/>
    <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#FFAA22" opacity="0.7"/>
    <circle r="3" fill="#FFFFFF" opacity="0.85"/>
  </g>
  <!-- Detached counter-rotating cylinder fragments -->
  <rect x="34" y="12" width="20" height="8" fill="#0a0000" stroke="#FF4455" stroke-width="0.6" transform="rotate(-15 44 16)" opacity="0.8"/>
  <rect x="68" y="14" width="22" height="8" fill="#0a0000" stroke="#FF4455" stroke-width="0.6" transform="rotate(12 79 18)" opacity="0.8"/>
  <!-- Debris field -->
  <circle cx="14" cy="20" r="1.2" fill="#FF4455" opacity="0.6"/>
  <circle cx="106" cy="22" r="1.5" fill="#FF4455" opacity="0.6"/>
  <circle cx="60" cy="62" r="1" fill="#FF4455" opacity="0.5"/>
  <circle cx="40" cy="68" r="0.8" fill="#FF4455" opacity="0.5"/>
  <circle cx="80" cy="68" r="1" fill="#FF4455" opacity="0.5"/>
  <circle cx="100" cy="62" r="0.8" fill="#FF4455" opacity="0.4"/>
  <circle cx="20" cy="62" r="0.9" fill="#FF4455" opacity="0.4"/>
  <circle cx="50" cy="8" r="0.7" fill="#FF4455" opacity="0.5"/>
  <circle cx="70" cy="6" r="0.9" fill="#FF4455" opacity="0.5"/>
  <!-- Streaks from explosion -->
  <line x1="60" y1="40" x2="44" y2="16" stroke="#FF4455" stroke-width="0.3" opacity="0.3"/>
  <line x1="60" y1="40" x2="79" y2="18" stroke="#FF4455" stroke-width="0.3" opacity="0.3"/>
  <line x1="60" y1="40" x2="20" y2="62" stroke="#FF4455" stroke-width="0.3" opacity="0.3"/>
  <line x1="60" y1="40" x2="100" y2="62" stroke="#FF4455" stroke-width="0.3" opacity="0.3"/>
</svg>
