<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" width="160" height="100">
  <!-- Destroyed side colony — broken cylinder split, panels detached, debris and explosion -->
  <!-- Detached solar panel fragments drifting -->
  <g transform="translate(15 22) skewY(-25) rotate(-12)">
    <polygon points="0,0 18,2 18,22 0,20" fill="#0a0000" stroke="#FF4455" stroke-width="0.7" opacity="0.75"/>
    <line x1="0" y1="6" x2="18" y2="8" stroke="#FF4455" stroke-width="0.3" opacity="0.5"/>
    <line x1="0" y1="14" x2="18" y2="16" stroke="#FF4455" stroke-width="0.3" opacity="0.5"/>
  </g>
  <g transform="translate(120 60) skewY(20) rotate(15)">
    <polygon points="0,0 22,3 22,24 0,21" fill="#0a0000" stroke="#FF4455" stroke-width="0.7" opacity="0.75"/>
    <line x1="0" y1="7" x2="22" y2="10" stroke="#FF4455" stroke-width="0.3" opacity="0.5"/>
  </g>

  <!-- Cylinder split into two halves with explosion in the middle -->
  <!-- Left half (back-cap + partial body) -->
  <ellipse cx="48" cy="46" rx="6" ry="14" fill="#1a0000" stroke="#FF4455" stroke-width="1"/>
  <line x1="48" y1="32" x2="74" y2="31" stroke="#FF4455" stroke-width="1"/>
  <line x1="48" y1="60" x2="74" y2="61" stroke="#FF4455" stroke-width="1"/>
  <path d="M 48 32 L 74 31 L 76 46 L 73 61 L 48 60 Z" fill="#1a0000" opacity="0.85"/>
  <!-- Crack on left half -->
  <line x1="60" y1="32" x2="64" y2="46" stroke="#FF4455" stroke-width="0.5"/>
  <line x1="64" y1="46" x2="60" y2="60" stroke="#FF4455" stroke-width="0.5"/>

  <!-- Right half (front-cap + partial body, slightly offset down) -->
  <ellipse cx="112" cy="48" rx="7" ry="16" fill="#1a0000" stroke="#FF4455" stroke-width="1"/>
  <line x1="112" y1="32" x2="88" y2="33" stroke="#FF4455" stroke-width="1"/>
  <line x1="112" y1="64" x2="88" y2="63" stroke="#FF4455" stroke-width="1"/>
  <path d="M 88 33 L 112 32 L 112 64 L 88 63 L 86 48 Z" fill="#1a0000" opacity="0.85"/>
  <!-- Crack on right half -->
  <line x1="98" y1="33" x2="94" y2="48" stroke="#FF4455" stroke-width="0.5"/>
  <line x1="94" y1="48" x2="98" y2="63" stroke="#FF4455" stroke-width="0.5"/>

  <!-- Explosion in the gap -->
  <g transform="translate(80 47)">
    <polygon points="0,-16 5,-4 16,0 5,4 0,16 -5,4 -16,0 -5,-4" fill="#FF4455" opacity="0.9"/>
    <polygon points="0,-9 2,-2 9,0 2,2 0,9 -2,2 -9,0 -2,-2" fill="#FFAA22" opacity="0.8"/>
    <circle r="3.5" fill="#FFFFFF" opacity="0.85"/>
  </g>

  <!-- Debris field -->
  <circle cx="20" cy="14" r="1.2" fill="#FF4455" opacity="0.6"/>
  <circle cx="140" cy="20" r="1.5" fill="#FF4455" opacity="0.6"/>
  <circle cx="80" cy="80" r="1.2" fill="#FF4455" opacity="0.5"/>
  <circle cx="40" cy="78" r="0.9" fill="#FF4455" opacity="0.5"/>
  <circle cx="120" cy="80" r="1" fill="#FF4455" opacity="0.5"/>
  <circle cx="60" cy="6" r="0.7" fill="#FF4455" opacity="0.5"/>
  <circle cx="100" cy="8" r="0.9" fill="#FF4455" opacity="0.5"/>
  <circle cx="2" cy="50" r="0.8" fill="#FF4455" opacity="0.4"/>
  <circle cx="155" cy="50" r="0.8" fill="#FF4455" opacity="0.4"/>

  <!-- Debris streaks from explosion -->
  <line x1="80" y1="47" x2="20" y2="14" stroke="#FF4455" stroke-width="0.3" opacity="0.3"/>
  <line x1="80" y1="47" x2="140" y2="20" stroke="#FF4455" stroke-width="0.3" opacity="0.3"/>
  <line x1="80" y1="47" x2="40" y2="78" stroke="#FF4455" stroke-width="0.3" opacity="0.3"/>
  <line x1="80" y1="47" x2="120" y2="80" stroke="#FF4455" stroke-width="0.3" opacity="0.3"/>
</svg>
