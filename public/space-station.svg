<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Central core -->
  <circle cx="32" cy="32" r="6" fill="#00D4FF" stroke="#FFFFFF" stroke-width="1"/>
  <!-- Solar panel arms -->
  <rect x="2" y="30" width="14" height="4" fill="#0a3d52" stroke="#00D4FF" stroke-width="0.5"/>
  <rect x="48" y="30" width="14" height="4" fill="#0a3d52" stroke="#00D4FF" stroke-width="0.5"/>
  <rect x="30" y="2" width="4" height="14" fill="#0a3d52" stroke="#00D4FF" stroke-width="0.5"/>
  <rect x="30" y="48" width="4" height="14" fill="#0a3d52" stroke="#00D4FF" stroke-width="0.5"/>
  <!-- Solar panel grid lines -->
  <line x1="6" y1="30" x2="6" y2="34" stroke="#00D4FF" stroke-width="0.5"/>
  <line x1="10" y1="30" x2="10" y2="34" stroke="#00D4FF" stroke-width="0.5"/>
  <line x1="52" y1="30" x2="52" y2="34" stroke="#00D4FF" stroke-width="0.5"/>
  <line x1="56" y1="30" x2="56" y2="34" stroke="#00D4FF" stroke-width="0.5"/>
  <line x1="30" y1="6" x2="34" y2="6" stroke="#00D4FF" stroke-width="0.5"/>
  <line x1="30" y1="10" x2="34" y2="10" stroke="#00D4FF" stroke-width="0.5"/>
  <line x1="30" y1="52" x2="34" y2="52" stroke="#00D4FF" stroke-width="0.5"/>
  <line x1="30" y1="56" x2="34" y2="56" stroke="#00D4FF" stroke-width="0.5"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="9" fill="none" stroke="#00D4FF" stroke-width="0.7" opacity="0.6"/>
  <!-- Antennae -->
  <line x1="32" y1="20" x2="32" y2="14" stroke="#FFFFFF" stroke-width="1"/>
  <circle cx="32" cy="14" r="1.5" fill="#FFFFFF"/>
</svg>
