  <!-- Solar panel arms — horizontal -->
  <rect x="2" y="30" width="14" height="4" fill="#001a14" stroke="#00E0A0" stroke-width="0.7"/>
  <rect x="48" y="30" width="14" height="4" fill="#001a14" stroke="#00E0A0" stroke-width="0.7"/>
  <line x1="6" y1="30" x2="6" y2="34" stroke="#00E0A0" stroke-width="0.5" opacity="0.7"/>
  <line x1="10" y1="30" x2="10" y2="34" stroke="#00E0A0" stroke-width="0.5" opacity="0.7"/>
  <line x1="52" y1="30" x2="52" y2="34" stroke="#00E0A0" stroke-width="0.5" opacity="0.7"/>
  <line x1="56" y1="30" x2="56" y2="34" stroke="#00E0A0" stroke-width="0.5" opacity="0.7"/>
  <!-- Solar panel arms — vertical -->
  <rect x="30" y="2" width="4" height="14" fill="#001a14" stroke="#00E0A0" stroke-width="0.7"/>
  <rect x="30" y="48" width="4" height="14" fill="#001a14" stroke="#00E0A0" stroke-width="0.7"/>
  <line x1="30" y1="6" x2="34" y2="6" stroke="#00E0A0" stroke-width="0.5" opacity="0.7"/>
  <line x1="30" y1="10" x2="34" y2="10" stroke="#00E0A0" stroke-width="0.5" opacity="0.7"/>
  <line x1="30" y1="52" x2="34" y2="52" stroke="#00E0A0" stroke-width="0.5" opacity="0.7"/>
  <line x1="30" y1="56" x2="34" y2="56" stroke="#00E0A0" stroke-width="0.5" opacity="0.7"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="11" fill="none" stroke="#00E0A0" stroke-width="0.8" opacity="0.7"/>
  <!-- Hub -->
  <circle cx="32" cy="32" r="6" fill="#003628" stroke="#00FF88" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="2.5" fill="#00FF88"/>
