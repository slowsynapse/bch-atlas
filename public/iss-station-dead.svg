<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" width="96" height="64">
  <!-- Exploded ISS station — debris field with broken truss -->
  <!-- Broken truss segments scattered -->
  <rect x="14" y="32" width="20" height="3" fill="#1a0000" stroke="#FF4455" stroke-width="0.8" transform="rotate(-12 24 33)"/>
  <rect x="58" y="34" width="22" height="3" fill="#1a0000" stroke="#FF4455" stroke-width="0.8" transform="rotate(8 69 35)"/>
  <!-- Detached solar panel (drifting) -->
  <rect x="2" y="10" width="14" height="8" fill="#0a0000" stroke="#FF4455" stroke-width="0.7" transform="rotate(-25 9 14)" opacity="0.7"/>
  <rect x="76" y="48" width="14" height="8" fill="#0a0000" stroke="#FF4455" stroke-width="0.7" transform="rotate(20 83 52)" opacity="0.7"/>
  <rect x="2" y="46" width="10" height="6" fill="#0a0000" stroke="#FF4455" stroke-width="0.6" transform="rotate(45 7 49)" opacity="0.6"/>
  <!-- Explosion core -->
  <g transform="translate(48 32)">
    <polygon points="0,-14 4,-4 14,0 4,4 0,14 -4,4 -14,0 -4,-4" fill="#FF4455" opacity="0.9"/>
    <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#FFAA22" opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="#FFFFFF" opacity="0.8"/>
  </g>
  <!-- Smaller debris -->
  <circle cx="22" cy="22" r="1.5" fill="#FF4455" opacity="0.6"/>
  <circle cx="74" cy="22" r="2" fill="#FF4455" opacity="0.6"/>
  <circle cx="34" cy="50" r="1" fill="#FF4455" opacity="0.5"/>
  <circle cx="62" cy="14" r="1.2" fill="#FF4455" opacity="0.5"/>
  <circle cx="86" cy="32" r="1" fill="#FF4455" opacity="0.4"/>
  <circle cx="10" cy="32" r="1.2" fill="#FF4455" opacity="0.5"/>
  <!-- Debris streaks -->
  <line x1="48" y1="32" x2="22" y2="22" stroke="#FF4455" stroke-width="0.4" opacity="0.3"/>
  <line x1="48" y1="32" x2="74" y2="22" stroke="#FF4455" stroke-width="0.4" opacity="0.3"/>
  <line x1="48" y1="32" x2="34" y2="50" stroke="#FF4455" stroke-width="0.4" opacity="0.3"/>
</svg>
